services:
  - type: web
    name: trisend-admin
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_UIDS
        sync: false          # paste your Firebase UID(s) here, comma-separated
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false          # paste the full JSON from your Firebase service account key
